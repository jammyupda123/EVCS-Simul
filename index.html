<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV 충전소 계약관리 CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
  :root{--bg:#f3f5f8;--surface:#ffffff;--surface2:#eef6fb;--border:#d4e5f0;--border2:#b8cfe0;--text:#1b2a4a;--text2:#4a6382;--text3:#94a3b8;--accent:#0e7490;--accent-bg:#eef6fb;--orange:#f97316;--orange-bg:#fff7ed;--danger:#dc2626;--danger-bg:#fef2f2;--warning:#ea580c;--warning-bg:#fff7ed;--caution:#2563eb;--caution-bg:#eff6ff;--success:#16a34a;--success-bg:#f0fdf4;--r:10px;--rs:6px;--header-bg:linear-gradient(135deg,#1b2a4a,#253d6b);--header-text:#fff;--header-sub:rgba(255,255,255,0.55);--header-btn-bg:rgba(255,255,255,0.08);--header-btn-border:rgba(255,255,255,0.2);--header-btn-text:rgba(255,255,255,0.85);--upload-bg:linear-gradient(180deg,#1b2a4a 0%,#253d6b 40%,var(--bg) 100%);--card-shadow:0 1px 3px rgba(0,0,0,0.04);--overlay-bg:rgba(27,42,74,.4)}
  body.dark{--bg:#0e1a2e;--surface:#152238;--surface2:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#22d3ee;--accent-bg:rgba(0,180,216,0.12);--orange:#fb923c;--orange-bg:rgba(249,115,22,0.12);--danger:#f87171;--danger-bg:rgba(248,113,113,0.1);--warning:#fb923c;--warning-bg:rgba(251,146,60,0.1);--caution:#60a5fa;--caution-bg:rgba(96,165,250,0.1);--success:#34d399;--success-bg:rgba(52,211,153,0.1);--header-bg:linear-gradient(135deg,#0a1120,#0e1a2e);--header-text:#e2e8f0;--header-sub:rgba(255,255,255,0.4);--header-btn-bg:rgba(255,255,255,0.06);--header-btn-border:rgba(255,255,255,0.15);--header-btn-text:rgba(255,255,255,0.7);--upload-bg:linear-gradient(180deg,#0a1120 0%,#0e1a2e 100%);--card-shadow:0 2px 8px rgba(0,0,0,0.2);--overlay-bg:rgba(0,0,0,.6)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
  #upload-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--upload-bg)}
  .upload-box{background:var(--surface);border:2px dashed var(--border2);border-radius:16px;padding:3rem 4rem;text-align:center;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(27,42,74,0.12)}
  .upload-box.drag-over{border-color:var(--orange);background:var(--orange-bg)}
  .up-icon{width:56px;height:56px;background:linear-gradient(135deg,#f97316,#fb923c);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
  .up-icon svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .up-title{font-size:18px;font-weight:700;margin-bottom:.5rem;color:var(--text)}
  .up-sub{color:var(--text2);font-size:13px;margin-bottom:1.5rem;line-height:1.7}
  .up-btn{background:linear-gradient(135deg,#f97316,#fb923c);color:#fff;border:none;border-radius:var(--rs);padding:.65rem 1.5rem;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(249,115,22,0.25);transition:transform .15s,box-shadow .15s}
  .up-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(249,115,22,0.3)}
  .up-hint{margin-top:1rem;font-size:12px;color:var(--text3)}
  #file-input{display:none}
  #app{display:none;flex-direction:column;min-height:100vh}
  .header{background:var(--header-bg);border-bottom:none;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(27,42,74,0.15)}
  .logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--header-text)}
  .logo-dot{width:22px;height:22px;border-radius:5px;background:linear-gradient(135deg,#f97316,#fb923c);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
  .hd-right{display:flex;align-items:center;gap:10px}
  .hd-count{font-size:12px;color:var(--header-sub);background:var(--header-btn-bg);padding:3px 10px;border-radius:20px}
  .reload-btn{border:1px solid var(--header-btn-border);background:var(--header-btn-bg);color:var(--header-btn-text);border-radius:var(--rs);padding:5px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .2s;font-family:'Pretendard',sans-serif}
  .reload-btn:hover{background:rgba(255,255,255,0.15)}
  .stats-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;gap:10px;flex-wrap:wrap}
  .stat-chip{display:flex;align-items:center;gap:8px;padding:.4rem 1rem;border-radius:20px;border:1px solid;font-size:12px;font-weight:600;cursor:pointer;transition:transform .15s}
  .stat-chip:hover{transform:translateY(-1px)}
  .stat-chip.danger{background:var(--danger-bg);border-color:#fecaca;color:var(--danger)}
  .stat-chip.warning{background:var(--warning-bg);border-color:#fed7aa;color:var(--warning)}
  .stat-chip.caution{background:var(--caution-bg);border-color:#bfdbfe;color:var(--caution)}
  .stat-chip.success{background:var(--success-bg);border-color:#bbf7d0;color:var(--success)}
  .stat-chip.total{background:var(--surface2);border-color:var(--border);color:var(--text2)}
  .stat-chip.active-filter{outline:2px solid var(--orange);outline-offset:1px}
  .stat-num{font-size:18px}
  .filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .filter-bar input,.filter-bar select{border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;font-size:13px;color:var(--text);background:var(--surface);outline:none;font-family:'Pretendard',sans-serif}
  .filter-bar input:focus,.filter-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,116,144,0.1)}
  .filter-bar input{min-width:200px}
  .filter-bar select option{background:var(--surface);color:var(--text)}
  .reset-btn{border:1px solid var(--border);background:var(--surface);color:var(--text2);border-radius:var(--rs);padding:6px 12px;font-size:12px;cursor:pointer;font-family:'Pretendard',sans-serif;font-weight:500}
  .reset-btn:hover{background:var(--surface2)}
  .insp-filters{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
  .insp-chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap}
  .insp-chip:hover{background:var(--surface2)}
  .insp-chip.on{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
  .sort-btn{border:1px solid var(--border);background:var(--surface);color:var(--text2);border-radius:var(--rs);padding:6px 10px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:500}
  .sort-btn:hover{background:var(--surface2)}
  .sort-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
  .main{padding:1.25rem 1.5rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  @media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr);gap:8px}.c-foot{flex-direction:column;align-items:flex-start;justify-content:flex-start;gap:2px}.c-charger{white-space:nowrap;text-align:left;width:100%}.c-note{max-width:100%;text-align:left;white-space:normal;width:100%}.c-top{flex-direction:column-reverse;gap:3px;align-items:flex-start}.c-name{text-align:left;width:100%}.c-chips{justify-content:flex-start}.c-addr{text-align:left}
    .group-hd{padding:8px 10px 6px 14px}
    .card.multi{min-width:0;overflow:hidden}
    .card.multi .c-inner{padding-left:8px}
    .group-cnt{font-size:9px;padding:1px 5px}
    .chip-group,.chip-grade{font-size:9px;padding:1px 5px}
    .sub-row{padding:6px 10px 6px 14px}
    .sub-inner{padding-left:6px}
    .sub-top{flex-wrap:wrap;gap:2px}
    .sub-label{font-size:11px}
    .sub-rem{font-size:10px}
    .sub-ym{font-size:9px}
    .sub-period{font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sub-meta{font-size:9px;line-height:1.6}
    .multi-note{padding:6px 10px 8px 14px}
    .multi-note-text{font-size:10px;-webkit-line-clamp:2}
    .logo{font-size:13px;gap:6px}.logo-dot{width:18px;height:18px;font-size:8px}
    .hd-right{gap:4px}.hd-count{display:none}
    .reload-btn{padding:6px;font-size:0;width:32px;height:32px;justify-content:center;overflow:hidden}
    .reload-btn svg{width:14px;height:14px;flex-shrink:0}
    #dark-label{display:none}
    .header{padding:0 .75rem;height:48px}
    .filter-bar{padding:.5rem .75rem}.filter-bar input{min-width:120px}
    .main{padding:.75rem}
  }
  .empty{text-align:center;padding:4rem 2rem;color:var(--text3)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
  .card:hover{box-shadow:0 4px 16px rgba(27,42,74,0.1);border-color:var(--border2);transform:translateY(-2px)}
  .card.single{padding:1rem 1.1rem}
  .c-bar{position:absolute;left:0;top:0;bottom:0;width:4px}
  .card.single .c-bar{border-radius:var(--r) 0 0 var(--r)}
  .c-bar.danger{background:var(--danger)}.c-bar.warning{background:var(--warning)}.c-bar.caution{background:var(--caution)}.c-bar.success{background:var(--success)}.c-bar.none{background:var(--border)}
  .card.multi{padding:0}
  .group-hd{padding:.65rem 1rem .55rem 1.35rem;background:var(--surface2);border-bottom:1px solid var(--border)}
  .group-hd-top{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:nowrap}
  .group-name{font-size:13px;font-weight:700;color:var(--text);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .group-cnt{font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;background:var(--orange-bg);color:var(--orange);flex-shrink:0;white-space:nowrap}
  .group-hd-sub{display:flex;align-items:center;gap:5px;flex-wrap:nowrap}
  .group-addr{font-size:11px;color:var(--text3);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;min-width:0;flex-shrink:1}
  .sub-row{padding:.65rem 1rem .6rem 1.35rem;border-bottom:1px solid var(--border);position:relative;cursor:pointer;transition:background .12s}
  .sub-row:last-child{border-bottom:none}
  .sub-row:hover{background:var(--surface2)}
  .sub-row .c-bar{border-radius:0}
  .sub-inner{padding-left:8px}
  .sub-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:2px}
  .sub-label{font-size:12px;font-weight:600;color:var(--text2)}
  .sub-period{font-size:10px;color:var(--text3);margin-top:1px}
  .sub-rem-row{display:flex;align-items:baseline;gap:4px;flex-shrink:0}
  .sub-rem{font-size:11px;font-weight:700}
  .sub-rem.danger{color:var(--danger)}.sub-rem.warning{color:var(--warning)}.sub-rem.caution{color:var(--caution)}.sub-rem.success{color:var(--success)}.sub-rem.none{color:var(--text3)}
  .sub-ym{font-size:10px}
  .sub-ym.danger{color:#ef4444}.sub-ym.warning{color:#f97316}.sub-ym.caution{color:#3b82f6}.sub-ym.success{color:#22c55e}.sub-ym.none{color:var(--text3)}
  .sub-meta{font-size:10px;color:var(--text3)}
  .multi-note{padding:6px 1rem 8px 1.35rem;border-top:1px solid var(--border);font-size:11px;color:var(--text2);line-height:1.5}
  .multi-note-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
  .multi-note-text{white-space:pre-wrap;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
  .insp-date-tag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;background:#eef6fb;color:#0369a1;border:1px solid #bae6fd;white-space:nowrap}
  body.dark .insp-date-tag{background:rgba(3,105,161,0.15);color:#38bdf8;border-color:rgba(56,189,248,0.3)}
  #changes-overlay{display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:200;align-items:stretch;justify-content:flex-end;backdrop-filter:blur(4px)}
  #changes-overlay.open{display:flex}
  #changes-panel{width:min(720px,100vw);background:var(--surface);overflow-y:auto;height:100vh;box-shadow:-4px 0 32px rgba(0,0,0,.2)}
  .ch-hd{padding:1rem 1.5rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .ch-title{flex:1;font-size:16px;font-weight:700}
  .ch-body{padding:1rem 1.5rem}
  .ch-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:.75rem 1rem;margin-bottom:8px}
  .ch-item-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .ch-item-name{font-size:13px;font-weight:700;color:var(--text)}
  .ch-item-group{font-size:11px;color:var(--accent);font-weight:600}
  .ch-field{display:flex;gap:8px;font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);align-items:flex-start}
  .ch-field:last-child{border-bottom:none}
  .ch-field-name{color:var(--text3);min-width:80px;flex-shrink:0;font-weight:600}
  .ch-field-val{color:var(--text);word-break:break-word;flex:1;display:flex;align-items:flex-start;flex-wrap:wrap;gap:2px}
  .ch-old{color:var(--danger);text-decoration:line-through;font-size:11px;opacity:.7;word-break:break-word}
  .ch-arrow{color:var(--text3);font-size:11px;flex-shrink:0}
  .ch-new{color:var(--success);font-weight:600;font-size:12px;word-break:break-word}
  .c-inner{padding-left:8px}
  .c-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px}
  .c-name{font-weight:700;font-size:14px;line-height:1.4;flex:1;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;min-width:0}
  .c-chips{display:flex;gap:4px;align-items:center;flex-shrink:0;flex-wrap:nowrap;justify-content:flex-end}
  .chip-group{font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--border);flex-shrink:0;white-space:nowrap}
  .chip-grade{font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;background:var(--orange-bg);color:#c2410c;border:1px solid #fed7aa;flex-shrink:0;white-space:nowrap}
  .c-addr{font-size:11px;color:var(--text3);margin-bottom:5px}
  .c-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
  .tag{font-size:11px;padding:2px 7px;border-radius:4px;border:1px solid var(--border);color:var(--text2);background:var(--surface2);font-weight:500}
  .tag.ok{border-color:#bbf7d0;background:var(--success-bg);color:var(--success)}
  .tag.no{border-color:#fecaca;background:var(--danger-bg);color:var(--danger)}
  .c-rem-row{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
  .c-rem{font-size:12px;font-weight:700}
  .c-rem.danger{color:var(--danger)}.c-rem.warning{color:var(--warning)}.c-rem.caution{color:var(--caution)}.c-rem.success{color:var(--success)}.c-rem.none{color:var(--text3)}
  .c-ym{font-size:11px;font-weight:600}
  .c-ym.danger{color:#ef4444}.c-ym.warning{color:#f97316}.c-ym.caution{color:#3b82f6}.c-ym.success{color:#22c55e}.c-ym.none{color:var(--text3)}
  .c-end{font-size:11px;color:var(--text3);margin-top:1px}
  .c-foot{margin-top:7px;padding-top:7px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .c-charger{font-size:12px;color:var(--text2)}.c-charger span{font-weight:600;color:var(--text)}
  .c-note{font-size:11px;color:var(--text3);max-width:150px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  #overlay{display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:200;align-items:stretch;justify-content:flex-end;backdrop-filter:blur(4px)}
  #overlay.open{display:flex}
  #panel{width:min(680px,100vw);background:var(--surface);overflow-y:auto;height:100vh;display:flex;flex-direction:column;box-shadow:-4px 0 32px rgba(0,0,0,.2)}
  .ph{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10;display:flex;align-items:center;gap:12px}
  .p-close{width:32px;height:32px;border:1px solid var(--border);border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
  .p-close:hover{background:var(--surface2);border-color:var(--border2)}
  .p-close svg{width:14px;height:14px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round}
  .p-title{flex:1}.p-name{font-size:17px;font-weight:700;line-height:1.3;color:var(--text)}.p-sid{font-size:12px;color:var(--text3);font-family:monospace;margin-top:2px}
  .p-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .badge{display:inline-flex;align-items:center;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
  .badge.ok{background:var(--success-bg);color:var(--success)}.badge.no{background:var(--danger-bg);color:var(--danger)}.badge.grade{background:var(--accent-bg);color:var(--accent)}
  .pb{padding:1.25rem 1.5rem;flex:1}
  .sec{margin-bottom:1.5rem}.sec-t{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
  .dg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .di{background:var(--surface2);border-radius:var(--rs);padding:.6rem .8rem}.di.full{grid-column:1/-1}
  .di-l{font-size:11px;color:var(--text3);margin-bottom:2px}.di-v{font-size:13px;font-weight:600;color:var(--text);word-break:break-all;white-space:pre-wrap}
  .ctr{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:.75rem 1rem;margin-bottom:8px}
  .ctr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .ctr-period{font-size:13px;font-weight:600}
  .ctr-right{display:flex;align-items:baseline;gap:5px}
  .ctr-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
  .ctr-badge.danger{background:var(--danger-bg);color:var(--danger)}.ctr-badge.warning{background:var(--warning-bg);color:var(--warning)}.ctr-badge.caution{background:var(--caution-bg);color:var(--caution)}.ctr-badge.success{background:var(--success-bg);color:var(--success)}.ctr-badge.none{background:var(--surface2);color:var(--text3)}
  .ctr-ym{font-size:11px;color:var(--text3)}
  .ctr-sub{font-size:12px;color:var(--text2)}
  .note-box{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--rs);padding:.7rem 1rem;font-size:13px;color:#92400e;line-height:1.6;white-space:pre-wrap}
  .c-info-grid{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:4px}
  .c-info-box{background:var(--surface2);border-radius:4px;padding:4px 6px;min-width:0}

// ── Firebase 초기화 ──
const firebaseConfig={

firebase.initializeApp(firebaseConfig);
const fbAuth=firebase.auth();
const fbDB=firebase.database();
const fbRef=fbDB.ref('modifications');
const fbAddRef=fbDB.ref('additions');
const fbDelRef=fbDB.ref('deletions');

// 익명 인증 (보안 규칙 적용을 위해)
let fbReady=false;
fbAuth.signInAnonymously().then(()=>{fbReady=true;}).catch(e=>console.warn('Firebase auth:',e));

// Firebase에 수정사항 저장 (타임스탬프 포함, 기존 불필요 필드 정리)
async function fbSave(rowIdx, changedFields){
  changedFields._modifiedAt=new Date().toISOString();
  const ref=fbRef.child(String(rowIdx));
  try{
    if(!fbAuth.currentUser) await fbAuth.signInAnonymously();
    // 기존 Firebase 데이터 읽기
    const snap=await ref.once('value');
    const existing=snap.val()||{};
    // 기존 데이터에 새 변경사항 병합
    const merged={...existing,...changedFields};
    // 원본 엑셀과 동일한 값은 제거 (불필요한 필드 정리)
    const cleaned={};
    const norm=s=>String(s??'').replace(/\r\n/g,'\n').replace(/\s+/g,' ').trim();
    Object.entries(merged).forEach(([k,v])=>{
      if(k==='_modifiedAt'){cleaned[k]=v;return;}
      if(!fieldLabels[k])return;
      const orig=getOrigVal(rowIdx,k);
      if(norm(v)!==norm(orig)) cleaned[k]=v;
    });
    if(Object.keys(cleaned).length<=1){
      // _modifiedAt만 남으면 노드 삭제
      ref.remove();
    }else{
      ref.set(cleaned);
    }
  }catch(e){
    // 실패 시 fallback: update만
    ref.update(changedFields);
  }
}

// Firebase에서 수정사항 전체 로드
function fbLoadAll(){
  return fbRef.once('value').then(snap=>snap.val()||{});
}

// 수정사항을 locations에 적용
function applyModifications(mods){
  if(!mods||!Object.keys(mods).length)return;
  locations.forEach(loc=>{
    loc.contracts.forEach(contract=>{
      const ri=String(contract._rowIdx);
      if(mods[ri]){
        Object.entries(mods[ri]).forEach(([field,val])=>{
          contract[field]=val;
          if(field in loc) loc[field]=val;
        });
        // 잔여기간 재계산
        if(contract.endDate){
          const d=new Date(String(contract.endDate).replace(/\./g,'-').substring(0,10));
          contract.endDateObj=isNaN(d)?null:d;
          contract.daysLeft=daysLeft(contract.endDateObj);
          contract.urgency=urg(contract.daysLeft);
        }
      }
    });
    // 대표 레코드 재계산
    const best=loc.contracts.reduce((a,b)=>{
      if(a.daysLeft===null&&b.daysLeft!==null)return b;
      if(b.daysLeft===null)return a;
      if(a.daysLeft>=0&&b.daysLeft>=0)return a.daysLeft<b.daysLeft?a:b;
      if(b.daysLeft>=0)return b;
      return a;
    });
    const saved=loc.contracts;
    Object.assign(loc,best);loc.contracts=saved;
  });
}

const C={no:0,group:1,seq:2,sid:3,name:4,type_:5,do_:6,sigungu:7,address:8,installType:9,grade:11,contract:12,fast100:13,fast50:14,slow_:15,total:16,baseDate:17,startDate:18,period:19,endDate:20,subsidyType:22,subsidyObl:23,subsidyBase:24,subsidyStart:25,subsidyEnd:26,revenue:27,inspection:28,inspector:29,ownCharger:30,installPos:31,ownPrice:32,ownParking:33,competitor:34,competitorPos:35,competitorQty:36,cpoPrice:37,cpoParking:38,note:39};
const TODAY=new Date();
let locations=[],filtered=[],sortMode='';
let origFileBuffer=null;

// 다크 모드 토글
function toggleDark(){
  document.body.classList.toggle('dark');
  const isDark=document.body.classList.contains('dark');
  localStorage.setItem('ev_crm_dark',isDark?'1':'0');
  document.getElementById('dark-label').textContent=isDark?'라이트':'다크';
}

    document.body.classList.add('dark');

  }
})();

// 1) 드래그 오닫힘 방지
let mdTarget=null;
const overlay=document.getElementById('overlay');
overlay.addEventListener('mousedown',e=>{mdTarget=e.target});
overlay.addEventListener('mouseup',e=>{
  if(mdTarget===overlay&&e.target===overlay)closeDetail();
  mdTarget=null;
});

// 변경사항 오버레이 클릭 닫기
const chOverlayEl=document.getElementById('changes-overlay');
chOverlayEl.addEventListener('click',e=>{if(e.target===chOverlayEl)closeChanges();});

// 모바일: textarea 내부 스크롤 시 패널 스크롤 방지
(function(){
  const panel=document.getElementById('panel');
  let taTouch=null;
  panel.addEventListener('touchstart',function(e){
    const ta=e.target.closest('textarea');
    if(ta&&ta.scrollHeight>ta.clientHeight){
      taTouch={el:ta,y:e.touches[0].clientY};
    }else{taTouch=null;}
  },{passive:true});
  panel.addEventListener('touchmove',function(e){
    if(!taTouch)return;
    const ta=taTouch.el;
    const dy=taTouch.y-e.touches[0].clientY;
    taTouch.y=e.touches[0].clientY;
    // textarea가 스크롤 가능한 상태일때 패널 스크롤 차단
    const atTop=ta.scrollTop<=0&&dy<0;
    const atBottom=ta.scrollTop+ta.clientHeight>=ta.scrollHeight&&dy>0;
    if(!atTop&&!atBottom){e.preventDefault();}
  },{passive:false});
  panel.addEventListener('touchend',function(){taTouch=null;},{passive:true});
})();

const dropZone=document.getElementById('drop-zone');
const fileInput=document.getElementById('file-input');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0])});

function handleFile(file,skipSave){
  const reader=new FileReader();
  reader.onload=e=>{
    origFileBuffer=e.target.result;
    if(!skipSave) idbSave(e.target.result); // IndexedDB에 저장
    const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const allRows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    processRows(allRows);
    document.getElementById('upload-screen').style.display='none';
    document.getElementById('app').style.display='flex';
  };
  reader.readAsArrayBuffer(file);
}
function resetApp(){document.getElementById('upload-screen').style.display='flex';document.getElementById('app').style.display='none';fileInput.value='';locations=[];filtered=[];sortMode='';origData=null;origFileBuffer=null;pState={li:-1,ci:0,ed:false};idbClear();}

function g(r,i){const v=r[i];return(v===null||v===undefined)?'':String(v).trim()}
function gDate(r,i){const v=r[i];if(v===null||v===undefined)return'';if(v instanceof Date){if(isNaN(v))return'';const fixed=new Date(v.getTime()+12*3600000);return fixed.getUTCFullYear()+'-'+String(fixed.getUTCMonth()+1).padStart(2,'0')+'-'+String(fixed.getUTCDate()).padStart(2,'0');}return String(v).trim()}
function parseDate(r,i){
  const v=r[i];if(!v)return null;
  if(v instanceof Date){if(isNaN(v))return null;return new Date(Date.UTC(v.getUTCFullYear(),v.getUTCMonth(),v.getUTCDate(),12,0,0));}
  const d=new Date(String(v).substring(0,10).replace(/\./g,'-')+'T12:00:00Z');
  return isNaN(d)?null:d;
}
function fmt(d){if(!d)return '';return `${d.getUTCFullYear()}.${String(d.getUTCMonth()+1).padStart(2,'0')}.${String(d.getUTCDate()).padStart(2,'0')}`}
function daysLeft(d){return d?Math.round((d-TODAY)/86400000):null}
function urg(days){if(days===null)return'none';if(days<0)return'none';if(days<=90)return'danger';if(days<=180)return'warning';if(days<=365)return'caution';return'success'}
function urgLabel(days){if(days===null)return'계약정보 없음';if(days<0)return`만료 (${Math.abs(days)}일 경과)`;if(days===0)return'오늘 만료';return`D-${days.toLocaleString()}`}

// 3) N년 N개월
function daysToYM(days){
  if(days===null||days<=0)return'';
  const y=Math.floor(days/365);const m=Math.floor((days%365)/30);
  if(y>0&&m>0)return`${y}년 ${m}개월`;if(y>0)return`${y}년`;if(m>0)return`${m}개월`;return`${days}일`;
}

function isOk(v){const s=(v||'').toString().toUpperCase().trim();return s==='O'||s==='Y'||s==='ㅇ'||s==='있음'||s==='예'||s==='계약서'}

function getInspectionStatus(inspection){
  if(!inspection||String(inspection).trim()==='')return{cls:'not-done',label:'미점검'};
  const s=String(inspection).trim();
  // 날짜 형식 체크 (YYYY-MM-DD, YYYY.MM.DD, YYYY/MM/DD 등)
  const dateMatch=s.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  if(dateMatch){
    const yr=dateMatch[1].slice(2);
    const month=parseInt(dateMatch[2],10);
    if(month>=1&&month<=6)return{cls:'done-h1',label:`${yr}년상반기점검완료`};
    if(month>=7&&month<=12)return{cls:'done-h2',label:`${yr}년하반기점검완료`};
  }
  // 순수 숫자+구분자로만 된 날짜도 체크 (예: 20240315)
  const dateMatch2=s.match(/^(\d{4})(\d{2})(\d{2})$/);
  if(dateMatch2){
    const yr=dateMatch2[1].slice(2);
    const month=parseInt(dateMatch2[2],10);
    if(month>=1&&month<=6)return{cls:'done-h1',label:`${yr}년상반기점검완료`};
    if(month>=7&&month<=12)return{cls:'done-h2',label:`${yr}년하반기점검완료`};
  }
  // 날짜가 아닌 텍스트
  return{cls:'done-text',label:'점검완료'};
}

function addrShort(l){
  const addr=l.address||'';const sigungu=l.sigungu||'';
  if(l.do_==='서울')return`${l.do_} ${sigungu}`;
  const tokens=addr.split(/[\s,(]+/);
  const admins=tokens.filter(t=>/[구군동읍면리]$/.test(t));
  const extra=admins.filter(a=>a&&a!==sigungu&&!sigungu.includes(a));
  const parts=[sigungu];if(extra[0])parts.push(extra[0]);if(extra[1])parts.push(extra[1]);
  return parts.join(' ');
}

// 국소의 모든 계약 중 가장 최근 점검일 반환
function getLatestInspDate(l){
  let latest=null;let latestStr='';
  for(const c of l.contracts){
    const raw=c.inspection;if(!raw)continue;
    const s=String(raw).trim();
    let d=null;
    const m1=s.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
    if(m1){d=new Date(+m1[1],+m1[2]-1,+m1[3]);}
    else{const m2=s.match(/^(\d{4})(\d{2})(\d{2})$/);if(m2)d=new Date(+m2[1],+m2[2]-1,+m2[3]);}
    if(d&&!isNaN(d)&&(!latest||d>latest)){latest=d;latestStr=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
  }
  return{date:latest,str:latestStr};
}

function processRows(allRows){
  const rows=allRows.slice(3); // 헤더 3행 제거
  const data=rows.filter(r=>r&&(r[C.name]||r[C.sid]));
  const map=new Map();
  data.forEach(r=>{
    const _rowIdx=allRows.indexOf(r); // 원본 rows에서의 0-based 인덱스 (XLSX encode_cell r 값)
    const sid=g(r,C.sid)||g(r,C.name);
    const endObj=parseDate(r,C.endDate);const days=daysLeft(endObj);

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();const dv=document.getElementById('f-do').value;const sv=document.getElementById('f-sigungu').value;const pv=document.getElementById('f-period').value;const cv=document.getElementById('f-contract').value;const ivs=getSelectedInsp();
  const inspFrom=document.getElementById('f-insp-from').value;const inspTo=document.getElementById('f-insp-to').value;
  filtered=locations.filter(l=>{
    // 삭제된 국소 제외
    if(!l._isAdded && l.contracts.some(c=>_deletedIds.has(c._rowIdx)))return false;
    if(q&&![l.name,l.sid,l.address].join(' ').toLowerCase().includes(q))return false;
    if(dv&&l.do_!==dv)return false;if(sv&&l.sigungu!==sv)return false;
    if(pv){
      const urgIncl={danger:['danger'],warning:['danger','warning'],caution:['danger','warning','caution'],success:['success'],none:['none']};
      if(!urgIncl[pv]||!urgIncl[pv].includes(l.urgency))return false;
    }
    if(cv){const ok=isOk(l.hasContract);if(cv==='Y'&&!ok)return false;if(cv==='N'&&ok)return false;}
    if(ivs.length>0){
      // 다중계약: 1개라도 점검완료면 해당 국소 점검완료
      const inspP=['done-h2','done-h1','done-text','not-done'];
      let bestInsp={cls:'not-done',label:'미점검'};
      for(const c of l.contracts){const ci_=getInspectionStatus(c.inspection);if(inspP.indexOf(ci_.cls)<inspP.indexOf(bestInsp.cls))bestInsp=ci_;}
      if(!ivs.includes(bestInsp.cls))return false;
    }
    if(inspFrom||inspTo){
      const id=getLatestInspDate(l);
      if(!id.date)return false;
      const ds=id.date.toISOString().slice(0,10);
      if(inspFrom&&ds<inspFrom)return false;
      if(inspTo&&ds>inspTo)return false;
    }
    return true;
  });
  if(sortMode==='asc')filtered.sort((a,b)=>(a.group||'').localeCompare(b.group||'','ko'));
  if(sortMode==='desc')filtered.sort((a,b)=>(b.group||'').localeCompare(a.group||'','ko'));

  ['danger','warning','caution','success','none'].forEach(u=>{const el=document.querySelector(`.stat-chip.${u}`);if(el)el.classList.toggle('active-filter',pv2===u)});
  const te=document.querySelector('.stat-chip.total');if(te)te.classList.toggle('active-filter',!pv2);
}

  const cnt={danger:0,warning:0,caution:0,success:0,none:0};active.forEach(l=>cnt[l.urgency]++);
  const cumul={danger:cnt.danger,warning:cnt.danger+cnt.warning,caution:cnt.danger+cnt.warning+cnt.caution,success:cnt.success,none:cnt.none};
  const lbl={danger:'3개월 이내',warning:'6개월 이내',caution:'1년 이내',success:'1년 이상',none:'만료/없음'};

    </div>`;

// ── 편집 상태
let origData=null;
let pState={li:-1,ci:0,ed:false};

function openDetail(li,ci){
  pState={li,ci,ed:false};
  renderPanel();
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
  history.pushState({panel:true},'');
}

// 뒤로가기 버튼으로 패널 닫기
window.addEventListener('popstate',function(){
  if(overlay.classList.contains('open')){
    _closingFromPop=true;
    closeDetail();
  }
});

function enterEdit(){
  // 편집 전 값 스냅샷 저장
  const l=filtered[pState.li];
  const contract=l.contracts[pState.ci]||l.contracts[0];
  const editableFields=['name','group','type_','do_','sigungu','address','installType','grade','hasContract','total','startDate','period','endDate','subsidyType','subsidyObl','subsidyBase','subsidyStart','subsidyEnd','revenue','inspection','inspector','ownCharger','installPos','ownPrice','ownParking','competitor','competitorPos','competitorQty','cpoPrice','cpoParking','note'];
  pState._beforeEdit={};
  editableFields.forEach(f=>{pState._beforeEdit[f]=String(contract[f]??'');});
  pState.ed=true;renderPanel();
}
function cancelEdit(){pState.ed=false;pState._beforeEdit=null;renderPanel();}

function saveEdits(){
  const {li,ci}=pState;
  const l=filtered[li];
  const contract=l.contracts[ci]||l.contracts[0];
  // 저장 직전 상태를 origData에 스냅샷 → 복원 시 이 시점으로 되돌아감
  const sid=l.sid||l.name;
  if(!origData) origData=[];
  const oi=origData.findIndex(o=>(o.sid||o.name)===sid);
  const snap=JSON.parse(JSON.stringify({...l,contracts:l.contracts}));
  if(oi>=0) origData[oi]=snap; else origData.push(snap);
  // 모든 입력값 저장
  document.querySelectorAll('#panel [data-field]').forEach(el=>{
    contract[el.dataset.field]=el.value;
    if(el.dataset.field in l) l[el.dataset.field]=el.value;
  });
  // 계약종료일 변경 시 잔여기간 재계산
  if(contract.endDate){
    const d=new Date(contract.endDate.replace(/\./g,'-').substring(0,10));
    contract.endDateObj=isNaN(d)?null:d;
    contract.daysLeft=daysLeft(contract.endDateObj);
    contract.urgency=urg(contract.daysLeft);
  }
  // 대표 레코드 재계산
  const saved=l.contracts;
  const best=saved.reduce((a,b)=>{
    if(a.daysLeft===null&&b.daysLeft!==null)return b;
    if(b.daysLeft===null)return a;
    if(a.daysLeft>=0&&b.daysLeft>=0)return a.daysLeft<b.daysLeft?a:b;
    if(b.daysLeft>=0)return b;
    return a;
  });
  Object.assign(l,best);l.contracts=saved;
  // Firebase에 수정사항 동기화 — 편집 전 스냅샷과 비교하여 실제 변경된 필드만 저장
  const editableFields=['name','group','type_','do_','sigungu','address','installType','grade','hasContract','total','startDate','period','endDate','subsidyType','subsidyObl','subsidyBase','subsidyStart','subsidyEnd','revenue','inspection','inspector','ownCharger','installPos','ownPrice','ownParking','competitor','competitorPos','competitorQty','cpoPrice','cpoParking','note'];
  const before=pState._beforeEdit||{};
  const fbFields={};
  editableFields.forEach(f=>{
    const cur=String(contract[f]??'');
    const prev=before[f]??'';
    if(cur!==prev) fbFields[f]=contract[f]??'';
  });
  if(Object.keys(fbFields).length){
    if(contract._isAdded){
      // 추가된 국소: additions에 전체 데이터 저장
      const allFields={};
      editableFields.forEach(f=>{allFields[f]=contract[f]??'';});
      allFields._modifiedAt=new Date().toISOString();
      fbAddRef.child(contract._addId).set(allFields);
    }else{
      fbSave(contract._rowIdx, fbFields);
    }
  }

  // 다중계약: 점검일자,점검자,특이사항 등 국소 공통 필드를 다른 계약에도 동기화
  const sharedFields=['inspection','inspector','note','revenue','ownCharger','installPos','ownPrice','ownParking','competitor','competitorPos','competitorQty','cpoPrice','cpoParking'];
  if(l.contracts.length>1){
    l.contracts.forEach(other=>{
      if(other===contract)return;
      const ofb={};
      sharedFields.forEach(f=>{
        const cur=String(contract[f]??'');
        const prev=String(other[f]??'');
        if(cur!==prev){other[f]=contract[f];ofb[f]=contract[f]??'';}
      });
      if(Object.keys(ofb).length) fbSave(other._rowIdx, ofb);
    });
  }
  pState.ed=false;pState._beforeEdit=null;renderPanel();renderGrid();
}

function restoreRecord(){
  if(!origData)return;
  const {li,ci}=pState;
  const l=filtered[li];
  const sid=l.sid||l.name;
  const origLoc=origData.find(o=>(o.sid||o.name)===sid);
  if(origLoc){
    const restored=JSON.parse(JSON.stringify(origLoc.contracts));
    l.contracts=restored;
    const best=restored.reduce((a,b)=>{
      if(a.daysLeft===null&&b.daysLeft!==null)return b;
      if(b.daysLeft===null)return a;
      if(a.daysLeft>=0&&b.daysLeft>=0)return a.daysLeft<b.daysLeft?a:b;
      if(b.daysLeft>=0)return b;
      return a;
    });
    Object.assign(l,best);l.contracts=restored;
  }
  pState.ed=false;renderPanel();renderGrid();
}

let _deletedIds=new Set(); // 삭제된 rowIdx 집합

  const id='add_'+Date.now();
  const newLoc={
    _isAdded:true, _addId:id,
    contracts:[{
      _rowIdx:'add_'+Date.now(), _isAdded:true, _addId:id,
      no:'',group:'',seq:'',sid:'',name:'(새 국소)',type_:'',do_:'',sigungu:'',address:'',installType:'',grade:'',hasContract:'',
      fast100:'',fast50:'',slow_:'',total:'',baseDate:'',startDate:'',period:'',endDate:'',endDateObj:null,
      daysLeft:null,urgency:'none',
      subsidyType:'',subsidyObl:'',subsidyBase:'',subsidyStart:'',subsidyEnd:'',
      revenue:'',inspection:'',inspector:'',ownCharger:'',installPos:'',ownPrice:'',ownParking:'',
      competitor:'',competitorPos:'',competitorQty:'',cpoPrice:'',cpoParking:'',note:''
    }],
    name:'(새 국소)',sid:'',group:'',type_:'',do_:'',sigungu:'',address:'',grade:'',
    daysLeft:null,urgency:'none',endDate:'',total:'',hasContract:'',installType:'',
    inspection:'',note:''
  };
  locations.push(newLoc);
  // Firebase에 저장
  fbAddRef.child(id).set(newLoc.contracts[0]);
  applyFilters();
  // 새 카드의 상세 패널 열고 편집모드
  const idx=filtered.findIndex(l=>l._addId===id);
  if(idx>=0){pState={li:idx,ci:0,ed:false};openDetail(idx,0);enterEdit();}

function deleteLocation(){
  const l=filtered[pState.li];
  if(!confirm(`"${l.name}" 국소를 삭제하시겠습니까?`))return;

  if(l._isAdded){
    // 추가된 국소: Firebase additions에서 삭제, locations에서 제거
    fbAddRef.child(l._addId).remove();
    const li=locations.indexOf(l);
    if(li>=0)locations.splice(li,1);
  }else{
    // 원본 엑셀 국소: deletions에 rowIdx 추가
    l.contracts.forEach(c=>{
      _deletedIds.add(c._rowIdx);
      fbDelRef.child(String(c._rowIdx)).set(true);
    });
  }
  closeDetail();
  applyFilters();
}

function copyLocation(){
  const l=filtered[pState.li];
  if(!confirm(`"${l.name}" 국소를 복사하시겠습니까?`))return;
  const id='add_'+Date.now();
  const copiedContract=JSON.parse(JSON.stringify(l.contracts[0]));
  copiedContract._rowIdx='add_'+Date.now();
  copiedContract._isAdded=true;
  copiedContract._addId=id;
  copiedContract.name=l.name+' (복사)';

  const newLoc=JSON.parse(JSON.stringify(l));
  newLoc._isAdded=true;
  newLoc._addId=id;
  newLoc.name=l.name+' (복사)';
  newLoc.contracts=[copiedContract];

  locations.push(newLoc);
  fbAddRef.child(id).set(copiedContract);
  applyFilters();
  const idx=filtered.findIndex(fl=>fl._addId===id);
  if(idx>=0){openDetail(idx,0);enterEdit();}
}

// ── 엑셀 다운로드: JSZip으로 원본 XML을 직접 수정 → 서식 100% 보존
async function downloadFile(){
  if(!origFileBuffer){alert('업로드된 파일이 없습니다.');return;}

  // Firebase 최신 데이터 전체 동기화 (수정+삭제+추가)
  await loadAllFirebaseData();

  const FCOLS={
    name:C.name+1,group:C.group+1,type_:C.type_+1,
    do_:C.do_+1,sigungu:C.sigungu+1,address:C.address+1,
    installType:C.installType+1,grade:C.grade+1,hasContract:C.contract+1,
    total:C.total+1,startDate:C.startDate+1,period:C.period+1,endDate:C.endDate+1,
    subsidyType:C.subsidyType+1,subsidyObl:C.subsidyObl+1,
    subsidyBase:C.subsidyBase+1,subsidyStart:C.subsidyStart+1,subsidyEnd:C.subsidyEnd+1,
    revenue:C.revenue+1,inspection:C.inspection+1,inspector:C.inspector+1,
    ownCharger:C.ownCharger+1,installPos:C.installPos+1,
    ownPrice:C.ownPrice+1,ownParking:C.ownParking+1,
    competitor:C.competitor+1,competitorPos:C.competitorPos+1,
    competitorQty:C.competitorQty+1,cpoPrice:C.cpoPrice+1,
    cpoParking:C.cpoParking+1,note:C.note+1
  };

  // 1) 수정할 셀 목록 수집: {cellRef: value}
  const updates={};
  locations.forEach(loc=>{
    loc.contracts.forEach(contract=>{
      const r=contract._rowIdx;
      if(r==null||r<0)return;
      if(contract._isAdded)return; // 추가된 국소는 별도 처리
      if(_deletedIds.has(r))return; // 삭제된 국소 제외
      Object.entries(FCOLS).forEach(([field,c])=>{
        const ref=XLSX.utils.encode_cell({r,c});
        updates[ref]=String(contract[field]??'');
      });
      // 잔여기간 수식 셀에 계산된 값 직접 기록 (W열=col22, L열=col11)
      const days=contract.daysLeft;
      let remain='';
      if(days!==null&&days>=0){
        const y=Math.floor(days/365);const m=Math.floor((days%365)/30);const d=days%365%30;
        remain=`${y}년 ${m}개월 ${d}일`;
      }else if(days!==null&&days<0){
        remain='만료';
      }
      updates[XLSX.utils.encode_cell({r,c:22})]=remain;
      updates[XLSX.utils.encode_cell({r,c:11})]=remain;
    });
  });

  try{
    // 2) 원본 xlsx를 ZIP으로 열기
    const zip=await JSZip.loadAsync(origFileBuffer);

    // 3) 첫 번째 시트 XML 파싱
    const sheetFile=zip.file('xl/worksheets/sheet1.xml');
    if(!sheetFile){alert('시트를 찾을 수 없습니다.');return;}
    const sheetXml=await sheetFile.async('string');

    const parser=new DOMParser();
    const doc=parser.parseFromString(sheetXml,'text/xml');
    const ns=doc.documentElement.namespaceURI;
    const sheetData=doc.getElementsByTagNameNS(ns,'sheetData')[0];

    // 기존 row 요소 맵핑 (1-based row number → element)
    const rowMap={};
    const rowEls=sheetData.getElementsByTagNameNS(ns,'row');
    for(let i=0;i<rowEls.length;i++){
      rowMap[rowEls[i].getAttribute('r')]=rowEls[i];
    }

    // 4) 각 셀 수정: inlineStr로 변환 (스타일 속성 s 유지)
    Object.entries(updates).forEach(([ref,val])=>{
      const decoded=XLSX.utils.decode_cell(ref);
      const rowNum=String(decoded.r+1); // XML은 1-based

      // row 찾기/생성
      let rowEl=rowMap[rowNum];
      if(!rowEl){
        rowEl=doc.createElementNS(ns,'row');
        rowEl.setAttribute('r',rowNum);
        sheetData.appendChild(rowEl);
        rowMap[rowNum]=rowEl;
      }

      // cell 찾기/생성
      const cells=rowEl.getElementsByTagNameNS(ns,'c');
      let cellEl=null;
      for(let i=0;i<cells.length;i++){
        if(cells[i].getAttribute('r')===ref){cellEl=cells[i];break;}
      }
      if(!cellEl){
        cellEl=doc.createElementNS(ns,'c');
        cellEl.setAttribute('r',ref);
        rowEl.appendChild(cellEl);
      }

      // 기존 v, f, is 제거 (스타일 속성 s는 건드리지 않음)
      ['v','f','is'].forEach(tag=>{
        const els=cellEl.getElementsByTagNameNS(ns,tag);
        while(els.length)cellEl.removeChild(els[0]);
      });

      // 원본 양식 보존: 값 타입에 따라 적절한 셀 타입 유지
      if(val===''||val==null){
        // 빈 값: 타입 제거
        cellEl.removeAttribute('t');
      }else if(!isNaN(val)&&val.toString().trim()!==''&&isFinite(Number(val))){
        // 숫자: 원본 숫자 타입 유지
        cellEl.removeAttribute('t');
        const vEl=doc.createElementNS(ns,'v');
        vEl.textContent=val;
        cellEl.appendChild(vEl);
      }else if(/^\d{4}\.\d{2}\.\d{2}$/.test(val)){
        // 날짜(YYYY.MM.DD): Excel 날짜 시리얼 넘버로 변환하여 원본 날짜 서식 유지
        const parts=val.split('.');
        const dt=new Date(Date.UTC(+parts[0],+parts[1]-1,+parts[2],12,0,0));
        if(!isNaN(dt)){
          // Excel epoch: 1899-12-30
          const epoch=new Date(Date.UTC(1899,11,30,0,0,0));
          const serial=Math.round((dt-epoch)/86400000);
          cellEl.removeAttribute('t');
          const vEl=doc.createElementNS(ns,'v');
          vEl.textContent=String(serial);
          cellEl.appendChild(vEl);
        }else{
          cellEl.setAttribute('t','inlineStr');
          const isEl=doc.createElementNS(ns,'is');
          const tEl=doc.createElementNS(ns,'t');
          tEl.setAttribute('xml:space','preserve');
          tEl.textContent=val;
          isEl.appendChild(tEl);
          cellEl.appendChild(isEl);
        }
      }else{
        // 텍스트: inlineStr
        cellEl.setAttribute('t','inlineStr');
        const isEl=doc.createElementNS(ns,'is');
        const tEl=doc.createElementNS(ns,'t');
        tEl.setAttribute('xml:space','preserve');
        tEl.textContent=val;
        isEl.appendChild(tEl);
        cellEl.appendChild(isEl);
      }
    });

    // 삭제된 행을 XML에서 제거
    if(_deletedIds.size>0){
      const allRowEls=sheetData.getElementsByTagNameNS(ns,'row');
      const toRemove=[];
      for(let i=0;i<allRowEls.length;i++){
        const rn=parseInt(allRowEls[i].getAttribute('r'),10);
        // rowIdx는 0-based, Excel row는 1-based
        if(_deletedIds.has(rn-1))toRemove.push(allRowEls[i]);
      }
      toRemove.forEach(el=>sheetData.removeChild(el));
    }

    // 5) XML 직렬화 후 zip에 다시 넣기
    const serializer=new XMLSerializer();
    let newXml=serializer.serializeToString(doc);
    zip.file('xl/worksheets/sheet1.xml',newXml);

    // calcChain.xml 제거 (수식→inlineStr 변환 시 불일치 방지)
    if(zip.file('xl/calcChain.xml')){
      zip.remove('xl/calcChain.xml');
      // Content_Types.xml에서 calcChain 참조도 제거
      const ctFile=zip.file('[Content_Types].xml');
      if(ctFile){
        let ct=await ctFile.async('string');
        ct=ct.replace(/<Override[^>]*calcChain[^>]*\/>/g,'');
        zip.file('[Content_Types].xml',ct);
      }
      // workbook.xml.rels에서도 제거
      const relsFile=zip.file('xl/_rels/workbook.xml.rels');
      if(relsFile){
        let rels=await relsFile.async('string');
        rels=rels.replace(/<Relationship[^>]*calcChain[^>]*\/>/g,'');
        zip.file('xl/_rels/workbook.xml.rels',rels);
      }
    }

    // 6) 다운로드
    const blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.style.display='none';a.href=url;a.download='Location_CRM_수정본.xlsx';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  }catch(e){
    console.error('다운로드 오류:',e);
    alert('다운로드 중 오류가 발생했습니다: '+e.message);
  }
}

const fieldToCols={name:C.name,group:C.group,type_:C.type_,do_:C.do_,sigungu:C.sigungu,address:C.address,installType:C.installType,grade:C.grade,hasContract:C.contract,total:C.total,startDate:C.startDate,period:C.period,endDate:C.endDate,subsidyType:C.subsidyType,subsidyObl:C.subsidyObl,subsidyBase:C.subsidyBase,subsidyStart:C.subsidyStart,subsidyEnd:C.subsidyEnd,revenue:C.revenue,inspection:C.inspection,inspector:C.inspector,ownCharger:C.ownCharger,installPos:C.installPos,ownPrice:C.ownPrice,ownParking:C.ownParking,competitor:C.competitor,competitorPos:C.competitorPos,competitorQty:C.competitorQty,cpoPrice:C.cpoPrice,cpoParking:C.cpoParking,note:C.note};
const dateFields=new Set(['startDate','endDate','subsidyStart','subsidyEnd']);

// 원본 엑셀에서 특정 행의 특정 필드 원본값 반환 (processRows와 동일한 파싱)
let _origCache=null;
function getOrigRows(){
  if(_origCache)return _origCache;
  const wb=XLSX.read(b64ToArrayBuffer(EMBEDDED_XLSX),{type:'array',cellDates:true});
  const ws=wb.Sheets[wb.SheetNames[0]];
  _origCache=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  return _origCache;
}
function getOrigVal(rowIdx,field){
  const col=fieldToCols[field];if(col===undefined)return '';
  const rows=getOrigRows();
  const row=rows[rowIdx];if(!row)return '';
  let v=row[col];if(v===null||v===undefined)return '';
  // 날짜 필드: processRows와 동일한 파싱 (YYYY.MM.DD)
  if(dateFields.has(field)){return fmt(parseDate(row,col));}
  // 점검일: gDate와 동일한 파싱 (YYYY-MM-DD)
  if(field==='inspection'){
    if(v instanceof Date&&!isNaN(v)){const d=new Date(v.getTime()+12*3600000);return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');}
  }
  return String(v).trim();
}

  // 날짜 필터 기준
  const fromDate=dateFrom?dateFrom+'T00:00:00.000Z':null;

  // 변경된 항목 수집
  function norm(s){return String(s??'').replace(/\r\n/g,'\n').replace(/\s+/g,' ').trim();}
  const items=[];
  locations.forEach(loc=>{
    loc.contracts.forEach(contract=>{
      const ri=String(contract._rowIdx);
      if(!mods[ri])return;
      const modAt=mods[ri]._modifiedAt||'';
      if(fromDate&&modAt&&modAt<fromDate)return;
      if(fromDate&&!modAt)return; // 타임스탬프 없는 옛날 데이터 스킵
      const changes=[];
      Object.entries(mods[ri]).forEach(([k,v])=>{
        if(k==='_modifiedAt')return;
        if(!fieldLabels[k])return;
        const newVal=String(v??'');
        const origVal=getOrigVal(contract._rowIdx,k);
        if(norm(newVal)===norm(origVal))return;
        changes.push({field:k,label:fieldLabels[k],oldVal:origVal,newVal:newVal});
      });
      if(changes.length)items.push({name:loc.name,group:loc.group,contractIdx:loc.contracts.indexOf(contract)+1,totalContracts:loc.contracts.length,modAt:modAt?modAt.slice(0,10):'',changes});
    });
  });

  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 헤더 (날짜 필터 포함)
  let html=`<div class="ch-hd">
    <div class="ch-title">변경사항</div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      <label style="font-size:11px;color:var(--text2);white-space:nowrap">이후 변경:</label>
      <input type="date" id="ch-date-from" value="${dateFrom||''}" onchange="renderChanges(this.value)" style="font-size:12px;padding:4px 6px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text)">
    </div>
    <div class="p-close" onclick="closeChanges()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
  </div>`;

  if(!items.length){
    html+=`<div class="ch-body"><div class="empty">해당 기간에 변경된 내용이 없습니다</div></div>`;
  }else{
    const totalChanges=items.reduce((s,it)=>s+it.changes.length,0);
    html+=`<div style="padding:6px 1.5rem;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border)">${items.length}개 국소 · ${totalChanges}개 항목 변경</div><div class="ch-body">`;
    items.forEach(it=>{
      html+=`<div class="ch-item"><div class="ch-item-hd"><span class="ch-item-name">${esc(it.name)}${it.totalContracts>1?' (계약'+it.contractIdx+')':''}</span><span class="ch-item-group">${esc(it.group||'')}${it.modAt?' · 수정 '+it.modAt:''}</span></div>`;
      it.changes.forEach(c=>{
        const oldDisp=c.oldVal?esc(c.oldVal.length>80?c.oldVal.substring(0,80)+'...':c.oldVal):'(없음)';
        const newDisp=c.newVal?esc(c.newVal.length>80?c.newVal.substring(0,80)+'...':c.newVal):'(삭제)';
        html+=`<div class="ch-field"><span class="ch-field-name">${c.label}</span><div class="ch-field-val"><span class="ch-old">${oldDisp}</span><span class="ch-arrow">→</span><span class="ch-new">${newDisp}</span></div></div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;
  }
  chPanel.innerHTML=html;
}
function closeChanges(){
  document.getElementById('changes-overlay').classList.remove('open');
  document.body.style.overflow='';
}

// ── IndexedDB 영속성 ──────────────────────────────
const IDB_NAME='ev_crm_db', IDB_STORE='files', IDB_KEY='origFile';

function idbOpen(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}

function idbSave(buffer){
  idbOpen().then(db=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(buffer,IDB_KEY);
  }).catch(()=>{});
}

function idbClear(){
  idbOpen().then(db=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).delete(IDB_KEY);
  }).catch(()=>{});
}

function idbLoad(){
  return idbOpen().then(db=>{
    return new Promise((res,rej)=>{
      const tx=db.transaction(IDB_STORE,'readonly');
      const req=tx.objectStore(IDB_STORE).get(IDB_KEY);
      req.onsuccess=e=>res(e.target.result||null);
      req.onerror=e=>rej(e.target.error);
    });
  }).catch(()=>null);
}

function b64ToArrayBuffer(b64){
  const bin=atob(b64);
  const buf=new ArrayBuffer(bin.length);
  const view=new Uint8Array(buf);
  for(let i=0;i<bin.length;i++) view[i]=bin.charCodeAt(i);
  return buf;
}

function loadFromBuffer(buf){
  origFileBuffer=buf;
  const wb=XLSX.read(buf,{type:'array',cellDates:true});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const allRows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  processRows(allRows);
  document.getElementById('upload-screen').style.display='none';
  document.getElementById('app').style.display='flex';
}

// 페이지 로드 시: 내장 데이터 로드 → Firebase 수정사항 적용 → 실시간 리스너
async function loadAllFirebaseData(){
  try{
    if(!fbAuth.currentUser) await fbAuth.signInAnonymously();
    const [modSnap,delSnap,addSnap]=await Promise.all([
      fbRef.once('value'),
      fbDelRef.once('value'),
      fbAddRef.once('value')
    ]);
    // 1) 내장 데이터 초기화
    loadFromBuffer(b64ToArrayBuffer(EMBEDDED_XLSX));
    // 2) 수정사항 적용
    const mods=modSnap.val()||{};
    if(Object.keys(mods).length) applyModifications(mods);
    // 3) 삭제 목록 적용
    _deletedIds=new Set();
    const dels=delSnap.val()||{};
    Object.keys(dels).forEach(k=>_deletedIds.add(isNaN(k)?k:Number(k)));
    // 4) 추가 국소 적용
    const adds=addSnap.val()||{};
    Object.entries(adds).forEach(([id,data])=>{
      if(locations.some(l=>l._addId===id))return;
      const endObj=data.endDate?new Date(data.endDate.replace(/\./g,'-').substring(0,10)+'T12:00:00Z'):null;
      const days=daysLeft(endObj&&!isNaN(endObj)?endObj:null);
      const rec={...data,_rowIdx:'add_'+id,_isAdded:true,_addId:id,endDateObj:endObj,daysLeft:days,urgency:urg(days)};
      const newLoc={...rec,contracts:[rec]};
      locations.push(newLoc);
    });
    // 5) 한번에 렌더
    buildStats();applyFilters();
  }catch(e){console.warn('Firebase 로드 실패:',e);}
}

(function autoRestore(){
  // 내장 데이터로 먼저 화면 표시
  loadFromBuffer(b64ToArrayBuffer(EMBEDDED_XLSX));
  // Firebase 전체 로드 후 실시간 리스너
  function startListener(){
    loadAllFirebaseData();
    // 수정사항 변경 시 전체 재로드
    fbRef.on('value', ()=>loadAllFirebaseData(), err=>{console.warn('Firebase read error:',err);});
  }
  fbAuth.signInAnonymously().then(()=>startListener()).catch(()=>startListener());
})();

</script>
